    <script>
        // 图片预览功能
        document.getElementById('coverUpload').addEventListener('change', function(e) {
            const preview = document.getElementById('coverPreview');
            preview.innerHTML = '';
            
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewItem = document.createElement('div');
                    previewItem.className = 'preview-item';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    
                    const removeBtn = document.createElement('div');
                    removeBtn.className = 'preview-remove';
                    removeBtn.innerHTML = 'x';
                    removeBtn.addEventListener('click', function() {
                        document.getElementById('coverUpload').value = '';
                        preview.innerHTML = '';
                    });
                    
                    previewItem.appendChild(img);
                    previewItem.appendChild(removeBtn);
                    preview.appendChild(previewItem);
                }
                reader.readAsDataURL(this.files[0]);
            }
        });
        
        document.getElementById('photosUpload').addEventListener('change', function(e) {
            const preview = document.getElementById('photosPreview');
            preview.innerHTML = '';
            
            if (this.files) {
                const maxFiles = 5;
                const filesCount = this.files.length > maxFiles ? maxFiles : this.files.length;
                
                for (let i = 0; i < filesCount; i++) {
                    const file = this.files[i];
                    const reader = new FileReader();
                    
                    reader.onload = function(e) {
                        const previewItem = document.createElement('div');
                        previewItem.className = 'preview-item';
                        
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        
                        previewItem.appendChild(img);
                        preview.appendChild(previewItem);
                    }
                    
                    reader.readAsDataURL(file);
                }
                
                if (this.files.length > maxFiles) {
                    alert('最多只能上传5张照片，系统将只处理前5张。');
                }
            }
        });
        
        // 倒计时功能
        function updateCountdown() {
            const endDate = new Date("<?php echo date('Y-m-d H:i:s', strtotime($countdown['endDate'])); ?>").getTime();
            const now = new Date().getTime();
            const distance = endDate - now;
            
            if (distance < 0) {
                document.querySelector('.zdjs').innerHTML = '<span class="h1">活动已结束</span>';
                return;
            }
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            // 如果页面上有倒计时元素则更新
            const countdownElements = document.querySelectorAll('.zdjs');
            if (countdownElements.length > 0) {
                document.getElementById("DD").innerHTML = days;
                document.getElementById("HH").innerHTML = hours;
                document.getElementById("MM").innerHTML = minutes;
                document.getElementById("SS").innerHTML = seconds;
            }
        }
        
        // 每秒更新一次
        setInterval(updateCountdown, 1000);
        
        // 表单验证
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            const requiredFields = ['name', 'phone', 'college', 'class', 'class_name', 'student_id'];
            let isValid = true;
            
            requiredFields.forEach(field => {
                const input = this.querySelector(`[name="${field}"]`);
                if (!input.value.trim()) {
                    isValid = false;
                    input.style.borderColor = '#e02020';
                } else {
                    input.style.borderColor = '#ddd';
                }
            });
            
            const coverUpload = document.getElementById('coverUpload');
            if (!coverUpload.files || coverUpload.files.length === 0) {
                isValid = false;
                document.getElementById('coverUploadBox').style.borderColor = '#e02020';
            } else {
                document.getElementById('coverUploadBox').style.borderColor = '#ddd';
            }
            
            if (!isValid) {
                e.preventDefault();
                alert('请填写所有必填字段并上传封面照片！');
            }
        });
    </script>
